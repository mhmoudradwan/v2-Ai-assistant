<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baseera Security Scanner</title>
  <link rel="stylesheet" href="popup.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#00BC7D"/>
                <stop offset="100%" style="stop-color:#00B8DB"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">Baseera</span>
      </div>
      <div class="header-auth">
        <span id="auth-status" class="auth-badge auth-badge--guest">Not logged in</span>
      </div>
    </div>

    <!-- URL Display -->
    <div class="url-section">
      <div class="url-label">Current Page</div>
      <div class="url-display" id="current-url">Loading...</div>
    </div>

    <!-- Scan Button -->
    <div class="scan-section">
      <button class="scan-btn" id="scan-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z" stroke="white" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Scan Page
      </button>
    </div>

    <!-- Scanning Indicator -->
    <div class="scanning-section" id="scanning-section" style="display:none;">
      <div class="scanning-spinner"></div>
      <span class="scanning-text">Scanning for vulnerabilities...</span>
    </div>

    <!-- Risk Score -->
    <div class="risk-section" id="risk-section" style="display:none;">
      <div class="risk-card">
        <div class="risk-label">Risk Score</div>
        <div class="risk-score-wrapper">
          <div class="risk-score" id="risk-score">0</div>
          <div class="risk-level" id="risk-level">Safe</div>
        </div>
        <div class="risk-bar">
          <div class="risk-bar-fill" id="risk-bar-fill"></div>
        </div>
      </div>
      <div class="vulns-summary">
        <div class="vuln-count critical">
          <span class="count-num" id="count-critical">0</span>
          <span class="count-label">Critical</span>
        </div>
        <div class="vuln-count high">
          <span class="count-num" id="count-high">0</span>
          <span class="count-label">High</span>
        </div>
        <div class="vuln-count medium">
          <span class="count-num" id="count-medium">0</span>
          <span class="count-label">Medium</span>
        </div>
        <div class="vuln-count low">
          <span class="count-num" id="count-low">0</span>
          <span class="count-label">Low</span>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="results-section" id="results-section" style="display:none;">
      <div class="results-header">
        <span class="results-title">Vulnerabilities Found</span>
        <span class="results-count" id="total-count">0</span>
      </div>
      <div class="results-list" id="results-list"></div>
    </div>

    <!-- No Issues Found -->
    <div class="no-issues" id="no-issues" style="display:none;">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#00BC7D" stroke-width="2"/>
        <path d="M9 12l2 2 4-4" stroke="#00BC7D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>No vulnerabilities detected!</p>
    </div>

    <!-- Submit to Backend -->
    <div class="submit-section" id="submit-section" style="display:none;">
      <button class="submit-btn" id="submit-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Save to Account
      </button>
      <div class="submit-status" id="submit-status"></div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a href="#" id="login-link" class="footer-link">Login to Baseera</a>
      <span class="footer-divider">|</span>
      <a href="#" id="open-app-link" class="footer-link">Open App</a>
    </div>
  </div>

  <script src="../scanners/index.js"></script>
  <script src="popup.js"></script>
</body>
</html>
